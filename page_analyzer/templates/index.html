<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Аналилизатор страниц</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">  
</head>
<body class="d-flex flex-column min-vh-100">
    <main class="flex-grow-1">
        <div class="container-lg mt-3">
            <div class="row">
                <div class="col-12 col-md-10 col-lg-8 mx-auto">
                    <div class="p-5 mb-4 bg-light border rounded-3">
                        <h1 class="display-3 fw-bold">Анализатор страниц</h1>
                        <p class="fs-4">Бесплатно проверяйте сайты на SEO-пригодность</p>
                        
                        <form action="/urls" method="post" class="row">
                            <div class="col-12 col-md-8">
                                <input type="text" name="url" placeholder="https://www.example.com" class="form-control form-control-lg" required>
                            </div>
                            <div class="col-12 col-md-4 mt-3 mt-md-0">
                                <button type="submit" class="btn btn-primary btn-lg px-5 text-uppercase">Проверить</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
